# Minimal Detekt config for Steady (#17)
# See https://detekt.dev/docs/intro

build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true

output-reports:
  active: true

comments:
  active: false

complexity:
  active: true
  ComplexMethod:
    active: true
    threshold: 15
  LongParameterList:
    active: true
    functionThreshold: 6

empty-blocks:
  active: true

exceptions:
  active: true

naming:
  active: true
  FunctionNaming:
    active: true
    excludes: ['**/test/**', '**/androidTest/**']

performance:
  active: true

potential-bugs:
  active: true

style:
  active: true
  MagicNumber:
    active: false  # many color ints etc.
  WildcardImport:
    active: false
  MaxLineLength:
    active: true
    maxLineLength: 120

# Add more rule sets as code matures.
